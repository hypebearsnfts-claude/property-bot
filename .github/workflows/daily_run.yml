name: Daily Property Scrape

on:
  schedule:
    - cron: "59 23 * * *"   # 23:59 UTC = 00:59 BST every day
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scheduler
        env:
          TELEGRAM_RESEARCH_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FILTER_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_RESEARCH_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_FILTER_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_MAPS_API_KEY:         ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scheduler.py

      - name: Commit updated seen_listings.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json || true
          git diff --cached --quiet || git commit -m "chore: update seen_listings [skip ci]"
          git push || true

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, urllib.request, urllib.parse
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat  = os.environ['TELEGRAM_CHAT_ID']
          data  = urllib.parse.urlencode({'chat_id': chat, 'text': '❌ Daily property run failed. Check: github.com/hypebearsnfts-claude/property-bot/actions'}).encode()
          urllib.request.urlopen(f'https://api.telegram.org/bot{token}/sendMessage', data=data)
          "
