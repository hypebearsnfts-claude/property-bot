name: Daily Property Scrape

on:
  schedule:
    - cron: "59 23 * * *"   # 23:59 UTC every day
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore seen_listings cache
        uses: actions/cache@v4
        with:
          path: seen_listings.json
          key: seen-listings-${{ github.run_id }}
          restore-keys: |
            seen-listings-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scheduler
        env:
          TELEGRAM_RESEARCH_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FILTER_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_RESEARCH_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_FILTER_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_MAPS_API_KEY:         ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scheduler.py

      - name: Save seen_listings cache
        if: always()   # save even if scheduler partially fails
        uses: actions/cache@v4
        with:
          path: seen_listings.json
          key: seen-listings-${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, urllib.request, urllib.parse
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat  = os.environ['TELEGRAM_CHAT_ID']
          data  = urllib.parse.urlencode({'chat_id': chat, 'text': '❌ Daily run failed. Check GitHub Actions logs.'}).encode()
          urllib.request.urlopen(f'https://api.telegram.org/bot{token}/sendMessage', data=data)
          "
