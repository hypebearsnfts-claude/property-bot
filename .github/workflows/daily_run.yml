name: Daily Property Scrape

on:
  schedule:
    - cron: "0 12 * * *"    # 12:00 UTC = 13:00 BST (London summer time, Mar–Oct)
                              #           = 12:00 GMT (London winter time, Oct–Mar, 1hr early)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write          # needed to push seen_listings.json back to the repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 16 forced cutover

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scheduler
        env:
          TELEGRAM_RESEARCH_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FILTER_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_RESEARCH_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_FILTER_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_MAPS_API_KEY:         ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          # Portal credentials for automated enquiry form submission.
          # Add these as GitHub Secrets under Settings → Secrets and variables → Actions.
          RIGHTMOVE_EMAIL:             ${{ secrets.RIGHTMOVE_EMAIL }}
          RIGHTMOVE_PASSWORD:          ${{ secrets.RIGHTMOVE_PASSWORD }}
          RIGHTMOVE_COOKIES:           ${{ secrets.RIGHTMOVE_COOKIES }}
          ZOOPLA_EMAIL:                ${{ secrets.ZOOPLA_EMAIL }}
          ZOOPLA_PASSWORD:             ${{ secrets.ZOOPLA_PASSWORD }}
          OTM_EMAIL:                   ${{ secrets.OTM_EMAIL }}
          OTM_PASSWORD:                ${{ secrets.OTM_PASSWORD }}
          # Optional residential/unlocker proxy for sites that block datacenter IPs.
          # Zoopla (Cloudflare) returns 403 from GitHub's IPs; set ZOOPLA_PROXY to a
          # residential/unlocker proxy URL (http://user:pass@host:port) and the
          # scraper routes through it. Leave unset and Zoopla simply returns 0.
          ZOOPLA_PROXY:                ${{ secrets.ZOOPLA_PROXY }}
          OPENRENT_PROXY:              ${{ secrets.OPENRENT_PROXY }}
        run: python scheduler.py

      - name: Commit updated seen_listings.json and enquiry_log.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json enquiry_log.json passed_*.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update seen_listings + enquiry_log [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import os, urllib.request, urllib.parse
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat  = os.environ['TELEGRAM_CHAT_ID']
          data  = urllib.parse.urlencode({'chat_id': chat, 'text': '❌ Daily property run failed. Check: github.com/hypebearsnfts-claude/property-bot/actions'}).encode()
          urllib.request.urlopen(f'https://api.telegram.org/bot{token}/sendMessage', data=data)
          "
